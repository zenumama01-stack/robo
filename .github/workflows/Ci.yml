name: Full Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  audit:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v4
    - name: Run lint
      run: |
        pip install flake8
        flake8 . || echo "Lint warnings only"

  test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        if [ -d tests ]; then pytest tests/; else echo "No tests found"; fi
