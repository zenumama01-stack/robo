    <form class="record-form"  #form="ngForm" >
      <div #topArea class="record-form-group">
      <mj-tabstrip (TabSelected)="onTabSelect($event)"  (ResizeContainer)="InvokeManualResize()">
        <mj-tab Name="Details">
        </mj-tab>
        <mj-tab-body>
          <mj-form-section
            Entity="MJ: Entity Actions"
            Section="details"
            [record]="record"
          </mj-form-section>
        </mj-tab-body>
        <mj-tab Name="MJ: Entity Action Params"
          [Visible]="record.IsSaved"
          [Props]="{EntityRelationshipID: 247}">
          <mj-join-grid
            [ShowSaveButton]="false"
            [ShowCancelButton]="false"
            [EditMode]="GridEditMode()"
            RowsEntityName="MJ: Action Params"
                            [RowsExtraFilter]="'ActionID=' + record.ActionID"
                            RowsEntityDisplayField="Name"
                            RowsEntityDataSource="FullEntity"
                            RowsOrderBy="ID"
                            RowsEntityDisplayName="Action Param"
                            ColumnsMode="Fields"
                            JoinEntityName="MJ: Entity Action Params"
                            JoinEntityRowForeignKey="ActionParamID"
                            [JoinEntityExtraFilter]="'EntityActionID=' + record.ID"
                            [JoinEntityDisplayColumns]="['ValueType', 'Value','Comments']"
            [NewRecordDefaultValues]="{EntityActionID: record.ID}"
          </mj-join-grid>
        <mj-tab Name="MJ: Entity Action Invocations"
          Invocations
            RowsEntityName="MJ: Entity Action Invocation Types"
            RowsOrderBy="Name"
            RowsEntityDisplayName="Type"
            JoinEntityName="MJ: Entity Action Invocations"
            JoinEntityRowForeignKey="InvocationTypeID"
                            [JoinEntityDisplayColumns]="['Status']"
            CheckBoxValueMode="RecordExists"
            style="height: 500px; width: 800px;"
        <mj-tab Name="MJ: Entity Action Filters"
          [Props]="{EntityRelationshipID: 248}">
            [Params]="BuildRelationshipViewParamsByEntityName('MJ: Entity Action Filters')"
            [NewRecordValues]="NewRecordValues('MJ: Entity Action Filters')"
            [AllowLoad]="IsCurrentTab('MJ: Entity Action Filters')"
      </mj-tabstrip>
